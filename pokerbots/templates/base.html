<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}HopAI Pokerbots{% endblock %}</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
          colors: {
            surface: { DEFAULT: '#0d1117', card: '#161b22', hover: '#1c2333', border: '#21262d' },
            brand:   { DEFAULT: '#22c55e', dim: '#16a34a', glow: 'rgba(34,197,94,0.15)' },
          },
        }
      }
    }
  </script>

  <style>
    * { box-sizing: border-box; }
    body { background: #0d1117; color: #e6edf3; font-family: 'Inter', sans-serif; }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 3px; }

    /* Card */
    .card { background: #161b22; border: 1px solid #21262d; border-radius: 12px; }
    .card-sm { background: #161b22; border: 1px solid #21262d; border-radius: 8px; }

    /* Status badges */
    .badge-idle     { background: #21262d; color: #8b949e; }
    .badge-running  { background: rgba(234,179,8,0.15); color: #eab308; border: 1px solid rgba(234,179,8,0.3); }
    .badge-complete { background: rgba(34,197,94,0.15); color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .badge-error    { background: rgba(239,68,68,0.15); color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .badge-pending  { background: #21262d; color: #6e7681; }

    /* Rank medals */
    .rank-gold   { color: #f59e0b; }
    .rank-silver { color: #94a3b8; }
    .rank-bronze { color: #b45309; }

    /* Pulse dot */
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50%       { opacity: .4; }
    }
    .pulse-dot { animation: pulse-dot 1.4s ease-in-out infinite; }

    /* Progress bar shimmer */
    @keyframes shimmer {
      0%   { background-position: -200% center; }
      100% { background-position:  200% center; }
    }
    .progress-shimmer {
      background: linear-gradient(90deg, #22c55e 0%, #4ade80 50%, #22c55e 100%);
      background-size: 200% auto;
      animation: shimmer 2s linear infinite;
    }

    /* Table rows */
    .trow { transition: background 0.15s; }
    .trow:hover { background: #1c2333; }

    /* Button styles */
    .btn-green {
      background: #22c55e; color: #0d1117; font-weight: 600;
      padding: 0.5rem 1.25rem; border-radius: 8px;
      transition: background 0.15s, transform 0.1s;
      cursor: pointer; border: none;
    }
    .btn-green:hover:not(:disabled) { background: #16a34a; }
    .btn-green:active:not(:disabled) { transform: scale(0.97); }
    .btn-green:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-red {
      background: transparent; color: #ef4444; font-weight: 500;
      padding: 0.5rem 1.25rem; border-radius: 8px;
      border: 1px solid rgba(239,68,68,0.4);
      transition: background 0.15s, border-color 0.15s;
      cursor: pointer;
    }
    .btn-red:hover:not(:disabled) { background: rgba(239,68,68,0.1); border-color: #ef4444; }
    .btn-red:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-ghost {
      background: transparent; color: #8b949e; font-weight: 500;
      padding: 0.5rem 1.25rem; border-radius: 8px;
      border: 1px solid #30363d;
      transition: background 0.15s, color 0.15s;
      cursor: pointer;
    }
    .btn-ghost:hover { background: #1c2333; color: #e6edf3; }

    /* Delta chips */
    .chip-pos { color: #22c55e; font-weight: 600; }
    .chip-neg { color: #ef4444; font-weight: 600; }
    .chip-zero { color: #6e7681; }
  </style>
</head>
<body class="min-h-screen">

  <!-- Nav -->
  <nav class="border-b border-[#21262d] px-6 py-4 flex items-center justify-between sticky top-0 z-50"
       style="background: rgba(13,17,23,0.92); backdrop-filter: blur(12px);">
    <a href="/" class="flex items-center gap-3 no-underline">
      <div class="w-8 h-8 rounded-lg flex items-center justify-center text-lg font-bold"
           style="background: linear-gradient(135deg,#22c55e,#16a34a); color:#0d1117;">♠</div>
      <div>
        <div class="text-white font-bold text-base leading-none">HopAI Pokerbots</div>
        <div class="text-[#6e7681] text-xs leading-none mt-0.5">Texas Hold'em Engine</div>
      </div>
    </a>
    <div class="flex items-center gap-4">
      {% block nav_extra %}{% endblock %}
      <a href="/submit"
         class="btn-green text-sm py-1.5 px-4 flex items-center gap-1.5">
        <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5"
                d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
        </svg>
        Submit Bot
      </a>
      <a href="/" class="text-[#8b949e] hover:text-white text-sm transition-colors">Dashboard</a>
    </div>
  </nav>

  <!-- Page content -->
  <main class="max-w-7xl mx-auto px-6 py-8">
    {% block content %}{% endblock %}
  </main>

  <!-- Toast notification -->
  <div id="toast"
       class="fixed bottom-6 right-6 px-4 py-3 rounded-lg text-sm font-medium shadow-xl
              transition-all duration-300 opacity-0 translate-y-2 pointer-events-none z-50"
       style="min-width:220px; background:#161b22; border:1px solid #21262d; color:#e6edf3;">
  </div>

  <script>
    function showToast(msg, type = 'info') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.borderColor = type === 'error' ? '#ef4444' : type === 'success' ? '#22c55e' : '#21262d';
      el.style.color = type === 'error' ? '#ef4444' : type === 'success' ? '#22c55e' : '#e6edf3';
      el.classList.remove('opacity-0', 'translate-y-2');
      el.classList.add('opacity-100', 'translate-y-0');
      setTimeout(() => {
        el.classList.add('opacity-0', 'translate-y-2');
        el.classList.remove('opacity-100', 'translate-y-0');
      }, 3200);
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
